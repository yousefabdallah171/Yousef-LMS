services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: dev
    command: npm run dev --workspace client -- --host 0.0.0.0 --port 5173
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_API_VERSION: v1
      VITE_API_PROXY_TARGET: http://server:3000
      VITE_LESSON_PROGRESS_DELAY_MS: 1000
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - client_node_modules:/app/client/node_modules
    depends_on:
      server:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: dev
    command: sh server/scripts/docker-dev-entrypoint.sh
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/yousef_lms_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: development-secret-change-me
      JWT_REFRESH_SECRET: development-refresh-secret-change-me
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      AUTH_RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_WINDOW_MS: 60000
      CLOUDFLARE_ACCOUNT_ID: local-dev
      CLOUDFLARE_ACCESS_KEY_ID: local-dev
      CLOUDFLARE_SECRET_ACCESS_KEY: local-dev
      R2_BUCKET_NAME: yousef-lms-proofs-dev
      R2_BUCKET_REGION: auto
      RESEND_API_KEY: local-dev
      FRONTEND_URL: http://localhost:5173
      PORT: 3000
      NODE_ENV: development
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - server_node_modules:/app/server/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: yousef_lms_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yousef_lms_dev"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  root_node_modules:
  client_node_modules:
  server_node_modules:
