<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-container": "#00a2e6",
              "on-primary": "#3f008d",
              "secondary-fixed": "#c9e6ff",
              "tertiary-fixed": "#ffdbc8",
              "on-tertiary-container": "#ffc19e",
              "on-secondary-fixed-variant": "#004c6e",
              "surface-dim": "#0d1322",
              "tertiary-fixed-dim": "#ffb68b",
              "primary": "#d3bbff",
              "surface-tint": "#d3bbff",
              "error-container": "#93000a",
              "outline": "#958da1",
              "on-primary-container": "#dac5ff",
              "on-error": "#690005",
              "tertiary-container": "#8f4200",
              "on-error-container": "#ffdad6",
              "on-tertiary-fixed-variant": "#743400",
              "on-tertiary-fixed": "#321300",
              "surface-bright": "#33394a",
              "on-surface": "#dde2f8",
              "surface-container-low": "#151b2b",
              "secondary": "#89ceff",
              "inverse-on-surface": "#2a3040",
              "primary-fixed-dim": "#d3bbff",
              "background": "#0d1322",
              "surface-container": "#191f2f",
              "on-secondary-container": "#00344e",
              "surface-variant": "#2f3445",
              "on-background": "#dde2f8",
              "tertiary": "#ffb68b",
              "primary-container": "#6d28d9",
              "surface-container-highest": "#2f3445",
              "secondary-fixed-dim": "#89ceff",
              "on-secondary-fixed": "#001e2f",
              "on-primary-fixed": "#250059",
              "surface-container-lowest": "#080e1d",
              "error": "#ffb4ab",
              "primary-fixed": "#ebddff",
              "outline-variant": "#4a4455",
              "on-tertiary": "#522300",
              "on-secondary": "#00344d",
              "on-surface-variant": "#ccc3d7",
              "inverse-primary": "#7331df",
              "surface": "#0d1322",
              "inverse-surface": "#dde2f8",
              "surface-container-high": "#242a3a",
              "on-primary-fixed-variant": "#5b00c5"
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Inter", "sans-serif"],
              "label": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0b1120;
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
<!-- Top Viewport Control (Theme Toggle) -->
<div class="fixed top-8 left-8 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-xl bg-surface-container-high text-on-surface-variant hover:bg-surface-container-highest transition-all duration-300">
<span class="material-symbols-outlined">dark_mode</span>
</button>
</div>
<!-- Main Card Container -->
<main class="w-full max-w-[420px] z-10">
<div class="bg-[#111827] rounded-xl overflow-hidden relative group">
<!-- Asymmetrical Background Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary-container/10 rounded-full blur-[80px]"></div>
<div class="p-8 relative">
<!-- Card Header: Logo -->
<div class="flex justify-start mb-10">
<div class="flex items-center gap-2">
<div class="w-10 h-10 rounded-lg bg-gradient-to-br from-primary-container to-on-primary-fixed-variant flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">cloud_done</span>
</div>
<span class="text-xl font-extrabold tracking-tight text-[#F9FAFB]">Yousef LMS</span>
</div>
</div>
<!-- Content Area -->
<div class="space-y-6">
<header class="space-y-2">
<h1 class="text-2xl font-bold text-[#F9FAFB] tracking-tight">استعادة كلمة المرور</h1>
<p class="text-sm leading-relaxed text-[#94A3B8]">
                            أدخل بريدك الإلكتروني المرتبط بحسابك وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
                        </p>
</header>
<!-- Form Section -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-2">
<label class="block text-sm font-medium text-[#F9FAFB] pr-1" for="email">
                                البريد الإلكتروني
                            </label>
<div class="relative group">
<div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-[#94A3B8] group-focus-within:text-secondary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full h-12 bg-surface-container-high border-0 rounded-xl pr-12 pl-4 text-[#F9FAFB] placeholder:text-slate-600 focus:ring-2 focus:ring-secondary/30 focus:bg-surface-container-highest transition-all duration-200" dir="ltr" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full h-12 bg-primary-container hover:bg-primary-container/90 text-white font-bold rounded-xl transition-all duration-300 transform active:scale-[0.98] shadow-lg shadow-primary-container/20 flex items-center justify-center gap-2" type="submit">
<span>إرسال رابط الاستعادة</span>
<span class="material-symbols-outlined text-sm">arrow_back_ios</span>
</button>
</form>
<!-- Footer Link -->
<div class="pt-4 text-center">
<a class="inline-flex items-center gap-1 text-sm font-medium text-[#0EA5E9] hover:text-[#0EA5E9]/80 transition-colors group" href="#">
<span class="material-symbols-outlined text-base group-hover:translate-x-1 transition-transform">arrow_forward</span>
<span>العودة لتسجيل الدخول</span>
</a>
</div>
</div>
</div>
</div>
<!-- Semantic Background Elements -->
<div class="mt-8 flex justify-center items-center gap-8 text-[#94A3B8] opacity-40">
<div class="h-[1px] flex-1 bg-gradient-to-l from-transparent to-surface-variant"></div>
<span class="material-symbols-outlined text-xl">security</span>
<div class="h-[1px] flex-1 bg-gradient-to-r from-transparent to-surface-variant"></div>
</div>
</main>
<!-- Footer Information -->
<footer class="fixed bottom-8 w-full max-w-7xl px-8 flex flex-col md:flex-row justify-between items-center gap-4 text-sm font-['Inter'] text-slate-500">
<div class="flex gap-6">
<a class="hover:text-slate-300 transition-colors" href="#">Terms</a>
<a class="hover:text-slate-300 transition-colors" href="#">Privacy</a>
<a class="hover:text-slate-300 transition-colors" href="#">Support</a>
</div>
<div>
            © 2024 Luminescent Void. All rights reserved.
        </div>
</footer>
<!-- Ambient Glow Visuals -->
<div class="fixed top-1/4 -left-1/4 w-1/2 h-1/2 bg-primary-container/5 rounded-full blur-[160px] pointer-events-none"></div>
<div class="fixed bottom-0 right-0 w-1/3 h-1/3 bg-secondary/5 rounded-full blur-[120px] pointer-events-none"></div>
</body></html>
