              "surface-container-high": "#242a3a",

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #0d1322; /* surface-dim */
      }
    </style>
</head>
<body class="font-body text-on-surface overflow-hidden">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full bg-[#0d1322] flex flex-row-reverse justify-between items-center px-6 py-4 md:px-12 z-50 bg-gradient-to-b from-[#0d1322] to-transparent">
<!-- Trailng Action: Theme Toggle (mapped from JSON trailing_icon_actions) -->
<button class="transition-all duration-300 hover:bg-white/5 p-2 rounded-full active:scale-95 transition-transform">
<span class="material-symbols-outlined text-slate-400" data-icon="dark_mode">dark_mode</span>
</button>
<!-- Brand Anchor (mapped from JSON product_name and style_brand_logo) -->
<div class="text-2xl font-bold tracking-tight text-[#6D28D9]">
            Luminescent AI
        </div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex items-center justify-center px-6">
<div class="w-full max-w-[520px] text-center">
<!-- Icon Badge with #0EA5E9 (Secondary) Accents -->
<div class="relative inline-flex items-center justify-center mb-8">
<div class="absolute inset-0 bg-secondary/10 blur-3xl rounded-full"></div>
<div class="relative w-24 h-24 rounded-full bg-surface-container-high border border-outline-variant/15 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-5xl" data-icon="signal_wifi_off">signal_wifi_off</span>
</div>
</div>
<!-- Heading: Arabic "لا يوجد اتصال بالإنترنت" -->
<h1 class="text-4xl font-extrabold font-headline text-on-surface tracking-tight mb-4">
                لا يوجد اتصال بالإنترنت
            </h1>
<!-- Description: Arabic AI/Programming Lessons Context -->
<p class="text-on-surface-variant text-lg mb-10 leading-relaxed font-body">
                يرجى التحقق من اتصالك بالشبكة والمحاولة مرة أخرى للوصول إلى دروس البرمجة والذكاء الاصطناعي.
            </p>
<!-- Actions Container -->
<div class="space-y-6">
<!-- Primary Retry Button: #6D28D9 Gradient (mapped from primary-container) -->
<button class="w-full py-4 px-8 rounded-xl bg-gradient-to-br from-[#6D28D9] to-[#6D28D9]/80 text-white font-bold text-lg transition-all duration-300 active:scale-[0.98] shadow-lg shadow-[#6D28D9]/20 hover:shadow-[#6D28D9]/30">
                    إعادة المحاولة
                </button>
<!-- Secondary Back Link -->
<div>
<a class="inline-block text-on-surface-variant hover:text-primary transition-colors duration-300 text-sm font-medium underline-offset-8 hover:underline decoration-primary" href="#">
                        العودة
                    </a>
</div>
</div>
<!-- Decorative Visual Elements -->
<div class="mt-16 pointer-events-none opacity-20 select-none">
<img alt="Minimalist abstract dark technology background" class="w-full h-32 object-contain mix-blend-screen" data-alt="abstract tech background with flowing deep violet and electric blue energy lines on a deep black canvas with subtle grain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJt7lBgZ5HoA_Of--2kauXa6YDv46xlsxUH9T0tzG1iJN-HXAfnpDbt_T9ph1mGifyQpJruRZhO51L9b3UOJwJ-u9uAXP7ZY1fWeG0tfQUxVN61ImqfxiJEsLg_x2TLwJZhy8zId6SXWyxxGH1pgxJCPhf4BUTblOIeveiT6532ZskfD4w4ll_6OD5xs0CuyklcJg_UOmVjNnAKk5tjdPj5XgiJHBmfuuvIEHz9U0XxuT5GACGckJ-ZOUNis8OtjrkTh-3NVjOShPp"/>
</div>
</div>
</main>
<!-- Background Atmospheric Glow -->
<div class="fixed top-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#6D28D9]/5 blur-[120px] rounded-full -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full -z-10"></div>
</body></html>
